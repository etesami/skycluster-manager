# permissions for end users to edit dataflowattributes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: skycluster-manager
    app.kubernetes.io/managed-by: kustomize
  name: policy-dataflowattribute-editor-role
rules:
- apiGroups:
  - policy.skycluster-manager.savitestbed.ca
  resources:
  - dataflowattributes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - policy.skycluster-manager.savitestbed.ca
  resources:
  - dataflowattributes/status
  verbs:
  - get
