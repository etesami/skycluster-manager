# permissions for end users to view virtualservices.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: skycluster-manager
    app.kubernetes.io/managed-by: kustomize
  name: core-virtualservice-viewer-role
rules:
- apiGroups:
  - core.skycluster-manager.savitestbed.ca
  resources:
  - virtualservices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.skycluster-manager.savitestbed.ca
  resources:
  - virtualservices/status
  verbs:
  - get
