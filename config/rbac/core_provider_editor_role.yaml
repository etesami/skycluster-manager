# permissions for end users to edit providers.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: skycluster-manager
    app.kubernetes.io/managed-by: kustomize
  name: core-provider-editor-role
rules:
- apiGroups:
  - core.skycluster-manager.savitestbed.ca
  resources:
  - providers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.skycluster-manager.savitestbed.ca
  resources:
  - providers/status
  verbs:
  - get
