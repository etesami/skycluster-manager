# permissions for end users to view ilptasks.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: skycluster-manager
    app.kubernetes.io/managed-by: kustomize
  name: core-ilptask-viewer-role
rules:
- apiGroups:
  - core.skycluster-manager.savitestbed.ca
  resources:
  - ilptasks
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.skycluster-manager.savitestbed.ca
  resources:
  - ilptasks/status
  verbs:
  - get
