apiVersion: apps/v1
kind: Deployment
metadata:
  name: c4
  annotations:
    skycluster-manager.savitestbed.ca/managed-by: skycluster
    skycluster-manager.savitestbed.ca/app-name: app1
  labels:
    skycluster-manager.savitestbed.ca/managed-by: skycluster
    skycluster-manager.savitestbed.ca/app-name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: c4
  template:
    metadata:
      labels:
        app: c4
    spec:
      # nodeSelector:
      #   skycluster/provider-name: savi
      #   skycluster/provider-region: vaughan
      containers:
      - name: c4
        image: busybox
        command: [ "sh", "-c", "while true; do (ping -c 1 ping-server-2 & ping -c 1 ping-server-3 & wait); sleep 1; done" ]
---
