apiVersion: apps/v1
kind: Deployment
metadata:
  name: c1
  annotations:
    skycluster-manager.savitestbed.ca/managed-by: skycluster
    skycluster-manager.savitestbed.ca/app-name: app1
  labels:
    skycluster-manager.savitestbed.ca/managed-by: skycluster
    skycluster-manager.savitestbed.ca/app-name: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: c1
  template:
    metadata:
      labels:
        app: c1
    spec:
      # nodeSelector:
      #   skycluster/provider-name: savi
      #   skycluster/provider-region: scinet
      containers:
      - name: c1
        image: busybox
        command: [ "sh", "-c", "while true; do ping -c 1 ping-server-3; sleep 1; done" ]
---
