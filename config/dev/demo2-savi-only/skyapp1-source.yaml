    skycluster-manager.savitestbed.ca/managed-by: skycluster
    skycluster-manager.savitestbed.ca/app-name: app1
  labels:
    skycluster-manager.savitestbed.ca/managed-by: skycluster
    skycluster-manager.savitestbed.ca/app-name: app1
spec:
  selector:
    app: c1
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
