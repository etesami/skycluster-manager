apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  annotations:
    skycluster-manager.savitestbed.ca/managed-by: skycluster
  labels:
    app: my-app
    skycluster-manager.savitestbed.ca/managed-by: skycluster
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-container
        image: nginx:latest
        ports:
        - containerPort: 80
