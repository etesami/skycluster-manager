apiVersion: core.skycluster-manager.savitestbed.ca/v1alpha1
kind: SkyApp
metadata:
  name: app10-10-skyapp
spec:
  appName: app10
  namespace: default
  appConfig:
    - name: frontend
      constraints:
        locationConstraints:
          - providerType: cloud
        virtualServiceConstraints:
          - virtualServiceName: vs1
    - name: backend
      constraints:
        locationConstraints:
          - providerType: cloud
        virtualServiceConstraints:
          - virtualServiceName: vs2
    - name: payment
      constraints:
        locationConstraints:
          - providerType: cloud
        virtualServiceConstraints:
          - virtualServiceName: vs3
